# Docker
# Build, publish and deploy academico-gateway image to Azure development and production servers.

trigger:
  branches:
    include:
    - main

pr: none

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: '5cffc302-0a35-4b2b-8ea1-04a9ebd67c07'
  imageRepository: 'academicmgmtorgacademicogateway'
  containerRegistry: 'acracademicoutn.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'
  selfHostedPool: 'Default'

  serviceName: 'academico-gateway'
  containerName: 'academico-gateway'
  composeFile: 'docker-compose.yml'
  grpcPort: '50050'
  sshUser: 'azureuser'

  devSshHost: '20.122.210.230'
  devGatewayHost: 'academia-dev.eastus2.cloudapp.azure.com'
  devMicroservicesHost: '20.114.139.164'
  devGatewayPath: '/home/azureuser/academico-gateway'
  devSshKey: '/home/azureuser/CREDENCIALES/academico-dev-gateway.pem'
  devSshKeyFallback: '/home/azureuser/academico-dev-gateway.pem'

  prodSshHost: '20.96.156.43'
  prodGatewayHost: 'academia-utn.eastus2.cloudapp.azure.com'
  prodMicroservicesHost: '20.115.132.131'
  prodGatewayPath: '/home/azureuser/academico-gateway'
  prodSshKey: '/home/azureuser/academico-prod-gateway.pem'
  prodSshKeyFallback: '/home/azureuser/CREDENCIALES/academico-prod-gateway.pem'

  productionApprover: 'gacalderonr@utn.edu.ec'

stages:
- stage: Build
  displayName: Build and push gateway image
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - job: Build
    displayName: Build and push
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
        addPipelineData: false

- stage: DeployDevelopment
  displayName: Deploy to development server 20.122.210.230
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployDevelopment
    displayName: Deploy gateway to development
    pool:
      name: $(selfHostedPool)
    steps:
    - task: Docker@2
      displayName: Login to Azure Container Registry
      inputs:
        command: login
        containerRegistry: $(dockerRegistryServiceConnection)

    - script: |
        set -euo pipefail

        require_env() {
          local name="$1"
          local value="${!name:-}"

          if [ -z "$value" ] || [[ "$value" == \$\(* ]]; then
            echo "Missing required environment variable: $name"
            exit 1
          fi
        }

        resolve_ssh_key() {
          local primary="$1"
          local fallback="${2:-}"

          if [ -f "$primary" ]; then
            printf '%s\n' "$primary"
            return 0
          fi

          if [ -n "$fallback" ] && [ -f "$fallback" ]; then
            printf '%s\n' "$fallback"
            return 0
          fi

          echo "SSH key not found. Tried: $primary ${fallback:-}" >&2
          return 1
        }

        for name in CONTAINER_REGISTRY IMAGE_REPOSITORY TAG SSH_HOST SSH_USER REMOTE_GATEWAY_PATH COMPOSE_SOURCE_FILE SERVICE_NAME AUTH_API_KEY CATALOGO_API_KEY GATEWAY_GRPC_PORT LOGIN_BASE_URL CATALOGO_BASE_URL; do
          require_env "$name"
        done

        if [ ! -f "$COMPOSE_SOURCE_FILE" ]; then
          echo "Missing compose source file: $COMPOSE_SOURCE_FILE"
          exit 1
        fi

        SSH_KEY="$(resolve_ssh_key "$SSH_KEY_PATH" "$SSH_KEY_FALLBACK")"
        chmod 600 "$SSH_KEY"

        IMAGE="${CONTAINER_REGISTRY}/${IMAGE_REPOSITORY}:${TAG}"
        REMOTE="${SSH_USER}@${SSH_HOST}"
        ENV_FILE_LOCAL="$(mktemp)"
        REMOTE_OVERRIDE_FILE=".docker-compose.pipeline.yml"

        cleanup() {
          rm -f "$ENV_FILE_LOCAL"
        }
        trap cleanup EXIT

        SSH_OPTS=(
          -i "$SSH_KEY"
          -o IdentitiesOnly=yes
          -o StrictHostKeyChecking=accept-new
        )

        DOCKER_CONFIG_FILE="${DOCKER_CONFIG:-$HOME/.docker}/config.json"
        if [ ! -f "$DOCKER_CONFIG_FILE" ]; then
          echo "Missing Docker config after ACR login: $DOCKER_CONFIG_FILE"
          exit 1
        fi

        umask 077
        {
          printf 'NODE_ENV=production\n'
          printf 'LOGIN_BASE_URL=%s\n' "$LOGIN_BASE_URL"
          printf 'LOGIN_API_KEY=%s\n' "$AUTH_API_KEY"
          printf 'CATALOGO_BASE_URL=%s\n' "$CATALOGO_BASE_URL"
          printf 'CATALOGO_API_KEY=%s\n' "$CATALOGO_API_KEY"
          printf 'GRPC_PORT=%s\n' "$GATEWAY_GRPC_PORT"
          printf 'LOG_LEVEL=info\n'
        } > "$ENV_FILE_LOCAL"

        echo "Copying ACR Docker login to development server..."
        ssh "${SSH_OPTS[@]}" "$REMOTE" "mkdir -p ~/.docker && umask 077 && cat > ~/.docker/config.json" < "$DOCKER_CONFIG_FILE"

        echo "Updating development .env and compose file..."
        ssh "${SSH_OPTS[@]}" "$REMOTE" "mkdir -p '$REMOTE_GATEWAY_PATH' && umask 077 && cat > '$REMOTE_GATEWAY_PATH/.env.pipeline'" < "$ENV_FILE_LOCAL"
        ssh "${SSH_OPTS[@]}" "$REMOTE" "mv '$REMOTE_GATEWAY_PATH/.env.pipeline' '$REMOTE_GATEWAY_PATH/.env' && chmod 600 '$REMOTE_GATEWAY_PATH/.env'"
        ssh "${SSH_OPTS[@]}" "$REMOTE" "cat > '$REMOTE_GATEWAY_PATH/$COMPOSE_FILE'" < "$COMPOSE_SOURCE_FILE"

        echo "Deploying development gateway container..."
        ssh "${SSH_OPTS[@]}" "$REMOTE" \
          "REMOTE_GATEWAY_PATH='$REMOTE_GATEWAY_PATH' COMPOSE_FILE='$COMPOSE_FILE' OVERRIDE_FILE='$REMOTE_OVERRIDE_FILE' SERVICE_NAME='$SERVICE_NAME' GATEWAY_IMAGE='$IMAGE' GATEWAY_GRPC_PORT='$GATEWAY_GRPC_PORT' bash -se" << 'REMOTE_SCRIPT'
        set -euo pipefail

        cd "$REMOTE_GATEWAY_PATH"

        docker network inspect academico-backend >/dev/null 2>&1 || docker network create academico-backend

        cat > "$OVERRIDE_FILE" <<EOF
        services:
          academico-gateway:
            image: ${GATEWAY_IMAGE}
        EOF

        wait_for_service() {
          local service="$1"
          local attempts=24
          local container_id=""
          local status=""

          for attempt in $(seq 1 "$attempts"); do
            container_id="$(docker compose --env-file .env -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" ps -q "$service" || true)"
            if [ -n "$container_id" ]; then
              status="$(docker inspect -f '{{.State.Status}}' "$container_id" 2>/dev/null || true)"
              if [ "$status" = "running" ]; then
                printf '%s\n' "$container_id"
                return 0
              fi
            fi
            sleep 5
          done

          echo "Service $service did not stay running."
          docker compose --env-file .env -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" ps || true
          docker compose --env-file .env -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" logs --tail=200 "$service" || true
          exit 1
        }

        echo "Validating compose configuration..."
        docker compose --env-file .env -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" config >/dev/null

        echo "Stopping previous gateway container..."
        docker compose --env-file .env -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" down --remove-orphans || true

        echo "Pulling gateway image..."
        docker compose --env-file .env -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" pull "$SERVICE_NAME"

        echo "Starting gateway service..."
        docker compose --env-file .env -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" up -d --remove-orphans --no-build "$SERVICE_NAME"

        echo "Verifying gateway service..."
        container_id="$(wait_for_service "$SERVICE_NAME")"
        if docker port "$container_id" | grep -q '^3000/'; then
          echo "Gateway must not publish HTTP port 3000."
          docker port "$container_id"
          exit 1
        fi
        if ! docker port "$container_id" | grep -q "^${GATEWAY_GRPC_PORT}/"; then
          echo "Gateway is not publishing gRPC port ${GATEWAY_GRPC_PORT}."
          docker port "$container_id" || true
          exit 1
        fi

        docker compose --env-file .env -f "$COMPOSE_FILE" -f "$OVERRIDE_FILE" ps
        docker image prune -f

        echo "Development deployment completed."
        REMOTE_SCRIPT

        if command -v grpcurl >/dev/null 2>&1; then
          echo "Checking gRPC descriptor on development endpoint..."
          for attempt in $(seq 1 12); do
            if grpcurl -plaintext "${PUBLIC_GRPC_HOST}:${GATEWAY_GRPC_PORT}" describe auth.v1.AuthService 2>/tmp/gateway-grpcurl.err | grep -q 'ResetPassword'; then
              echo "ResetPassword is available through development gateway."
              exit 0
            fi
            sleep 5
          done
          cat /tmp/gateway-grpcurl.err || true
          echo "ResetPassword was not found on development gateway."
          exit 1
        fi

        echo "grpcurl is not installed on the deploy agent; skipping descriptor check."
      displayName: Deploy academico-gateway to development
      env:
        CONTAINER_REGISTRY: $(containerRegistry)
        IMAGE_REPOSITORY: $(imageRepository)
        TAG: $(tag)
        SSH_HOST: $(devSshHost)
        SSH_USER: $(sshUser)
        SSH_KEY_PATH: $(devSshKey)
        SSH_KEY_FALLBACK: $(devSshKeyFallback)
        REMOTE_GATEWAY_PATH: $(devGatewayPath)
        COMPOSE_FILE: $(composeFile)
        COMPOSE_SOURCE_FILE: $(Build.SourcesDirectory)/$(composeFile)
        SERVICE_NAME: $(serviceName)
        CONTAINER_NAME: $(containerName)
        AUTH_API_KEY: $(USUARIOS_API_KEY)
        CATALOGO_API_KEY: $(CATALOGO_API_KEY)
        LOGIN_BASE_URL: http://$(devMicroservicesHost):3001
        CATALOGO_BASE_URL: http://$(devMicroservicesHost):3003
        GATEWAY_GRPC_PORT: $(grpcPort)
        PUBLIC_GRPC_HOST: $(devGatewayHost)

- stage: ApproveProduction
  displayName: Approve production deployment to 20.96.156.43
  dependsOn: DeployDevelopment
  condition: succeeded()
  jobs:
  - job: WaitForProductionApproval
    displayName: Await production approval
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@1
      displayName: Approve production deployment
      timeoutInMinutes: 1440
      inputs:
        notifyUsers: $(productionApprover)
        approvers: $(productionApprover)
        allowApproversToApproveTheirOwnRuns: true
        instructions: 'Approve to deploy academico-gateway to production server 20.96.156.43.'
        onTimeout: reject

