name: CI/CD Pipeline (API Gateway)

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # --- CONFIGURACIÓN ESPECIFICA DEL GATEWAY ---
  SERVICE_NAME: api_gateway
  DEPLOY_PATH: /home/utn_movil/apps/api_gateway/

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=raw,value=prod,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=sha-,format=short
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, cedia-dev-gateway]
    
    steps:
      - name: Actualizar DEV
        run: |
          echo "Desplegando Gateway en DEV..."
          
          IMAGE_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          cd ${{ env.DEPLOY_PATH }} || { echo "Error: Carpeta no encontrada"; exit 1; }
          
          # Descargar nueva imagen
          docker pull ghcr.io/$IMAGE_LOWER:dev
          
          # Actualizar SOLO el servicio api_gateway (sin reiniciar Traefik/Redis innecesariamente)
          docker compose up -d --no-deps ${{ env.SERVICE_NAME }}
          
          docker image prune -f

      - name: Verificar Salud
        run: |
          echo "Esperando inicio (10s)..."
          sleep 10
          
          cd ${{ env.DEPLOY_PATH }} || { echo "Error: Carpeta no encontrada"; exit 1; }
          
          if [ -z "$(docker compose ps -q ${{ env.SERVICE_NAME }})" ]; then
            echo "Error: El Gateway DEV no arranco."
            exit 1
          else
            echo "Gateway DEV corriendo correctamente."
            docker compose ps ${{ env.SERVICE_NAME }}
          fi

  deploy-prod:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux, cedia-prod-gateway]
    
    steps:
      - name: Actualizar PROD
        run: |
          echo "Desplegando Gateway en PROD..."
          
          IMAGE_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          cd ${{ env.DEPLOY_PATH }} || { echo "Error: Carpeta no encontrada"; exit 1; }
          
          docker pull ghcr.io/$IMAGE_LOWER:prod
          docker compose up -d --no-deps ${{ env.SERVICE_NAME }}
          docker image prune -f

      - name: Verificar Salud
        run: |
          cd ${{ env.DEPLOY_PATH }} || { echo "Error: Carpeta no encontrada"; exit 1; }
          
          echo "Esperando inicio (10s)..."
          sleep 10
          
          if [ -z "$(docker compose ps -q ${{ env.SERVICE_NAME }})" ]; then
            echo "Error: El Gateway PROD no arranco."
            exit 1
          else
            echo "Gateway PROD corriendo correctamente."
            docker compose ps ${{ env.SERVICE_NAME }}
          fi